name: ci-develop

on:
  pull_request:
    branches: [ develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install linters
      run: |
        npm install htmlhint stylelint stylelint-config-standard --save-dev

    - name: Run HTMLHint
      run: npx htmlhint "src/**/*.html" --config .htmlhintrc.json

    - name: Run Stylelint
      run: npx stylelint "styles/**/*.css" --config .stylelintrc.json